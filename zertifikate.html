    rel="stylesheet">
  <link rel="stylesheet" href="accessibility.css">
  <style>
    :root {
      --cream: #e3f2fd;
      --warm-white: #f5faff;
      --dark: #0a2540;
      --charcoal: #0d3060;
      --brown-mid: #0496ff;
      --accent: #0496ff;
      --accent-light: #90caf9;
      --text-body: #1a2e45;
      --text-muted: #5a7a99;
      --border: rgba(4, 150, 255, 0.15);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--text-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NAV — styles live in accessibility.css */

    /* ══════════════════════════════
       HERO
    ══════════════════════════════ */
    .zert-hero {
      padding: 160px 60px 80px;
      text-align: center;
      position: relative;
    }

    .zert-hero-label {
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .zert-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 56px;
      font-weight: 300;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .zert-hero p {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto;
      font-weight: 300;
      line-height: 1.7;
    }

    /* ══════════════════════════════
       GALLERY
    ══════════════════════════════ */
    .zert-gallery {
      padding: 0 60px 100px;
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    .zert-card {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      background: var(--cream);
      aspect-ratio: 3 / 4;
      opacity: 0;
      transform: translateY(60px) scale(0.95);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .zert-card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .zert-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .zert-card:hover img {
      transform: scale(1.05);
    }

    /* Reveal curtain effect */
    .zert-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--warm-white);
      transform-origin: top;
      transition: transform 1s cubic-bezier(0.76, 0, 0.24, 1);
      transform: scaleY(1);
    }

    .zert-card.revealed::after {
      transform: scaleY(0);
      transform-origin: bottom;
    }

    /* ══════════════════════════════
       LIGHTBOX
    ══════════════════════════════ */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10, 37, 64, 0.92);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .lightbox.active img {
      transform: scale(1) translateY(0);
    }

    .lightbox-close {
      position: absolute;
      top: 28px;
      right: 36px;
      width: 44px;
      height: 44px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.7);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .lightbox-close:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.7);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .lightbox-nav:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }

    .lightbox-prev {
      left: 24px;
    }

    .lightbox-next {
      right: 24px;
    }

    .lightbox-counter {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    footer {
      background: var(--dark);
      padding: 60px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 60px;
      align-items: start;
    }

    .footer-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      color: var(--cream);
      margin-bottom: 12px;
      font-weight: 300;
    }

    .footer-brand-name span {
      color: var(--accent);
    }

    .footer-tagline {
      font-size: 13px;
      color: rgba(227, 242, 253, .45);
      line-height: 1.6;
      max-width: 240px;
      font-weight: 300;
      margin-bottom: 28px;
    }

    .footer-social {
      display: flex;
      gap: 12px;
    }

    .footer-social a {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(227, 242, 253, .45);
      font-size: 13px;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }

    .footer-social a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .footer-col-title {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(227, 242, 253, .4);
      margin-bottom: 20px;
    }

    .footer-col ul {
      list-style: none;
    }

    .footer-col li+li {
      margin-top: 10px;
    }

    .footer-col a {
      color: rgba(227, 242, 253, .5);
      font-size: 13px;
      text-decoration: none;
      transition: color .2s;
      font-weight: 300;
    }

    .footer-col a:hover {
      color: var(--cream);
    }

    .footer-bottom {
      background: #061828;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-bottom p {
      font-size: 11px;
      color: rgba(227, 242, 253, .3);
      letter-spacing: .06em;
    }

    .footer-bottom a {
      color: rgba(227, 242, 253, .3);
      text-decoration: none;
      font-size: 11px;
      transition: color .2s;
    }

    .footer-bottom a:hover {
      color: rgba(227, 242, 253, .5);
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 1024px) {
      nav {
        padding: 16px 32px;
      }

      .zert-hero {
        padding: 140px 40px 60px;
      }

      .zert-hero h1 {
        font-size: 44px;
      }

      .zert-gallery {
        padding: 0 40px 80px;
      }

      footer {
        padding: 48px 40px;
        gap: 40px;
      }

      .footer-bottom {
        padding: 18px 40px;
      }
    }

    @media (max-width: 768px) {
      nav {
        padding: 14px 20px;
      }

      .nav-links {
        display: none;
      }

      .nav-hamburger {
        display: flex;
      }

      .zert-hero {
        padding: 120px 24px 48px;
      }

      .zert-hero h1 {
        font-size: 36px;
      }

      .zert-hero p {
        font-size: 15px;
      }

      .zert-gallery {
        padding: 0 24px 64px;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .lightbox-prev {
        left: 12px;
      }

      .lightbox-next {
        right: 12px;
      }

      footer {
        grid-template-columns: 1fr 1fr;
        gap: 36px;
        padding: 48px 24px 0;
      }

      .footer-bottom {
        padding: 16px 24px;
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .footer-links {
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .zert-hero h1 {
        font-size: 30px;
      }

      .zert-gallery {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 0 20px 56px;
      }

      footer {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 36px 20px 0;
      }

      .footer-bottom {
        padding: 14px 20px;
      }
    }
  </style>
</head>
